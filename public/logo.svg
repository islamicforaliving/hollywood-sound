<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="250" y="85" font-family="Impact, Arial Black, sans-serif" font-size="72" font-weight="900" fill="#dc2626" text-anchor="middle" letter-spacing="4" filter="url(#glow)">HOLLYWOOD</text>
  <text x="250" y="165" font-family="Impact, Arial Black, sans-serif" font-size="72" font-weight="900" fill="#dc2626" text-anchor="middle" letter-spacing="6" filter="url(#glow)">SOUND</text>
  <text x="250" y="85" font-family="Impact, Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="4">HOLLYWOOD</text>
  <text x="250" y="165" font-family="Impact, Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="6">SOUND</text>
</svg>