<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="led1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="led2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="led3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bg3)"/>
  <rect width="600" height="400" fill="url(#grid3)"/>
  
  <!-- Glow -->
  <circle cx="300" cy="180" r="140" fill="url(#glow3)"/>
  
  <!-- LED strips -->
  <!-- Top strip -->
  <rect x="150" y="130" width="300" height="12" rx="6" fill="url(#led1)" opacity="0.9"/>
  <circle cx="165" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="195" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="225" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="255" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="285" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="315" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="345" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="375" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="405" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  <circle cx="435" cy="136" r="4" fill="#fef3c7" opacity="0.9"/>
  
  <!-- Middle strip -->
  <rect x="170" y="170" width="260" height="12" rx="6" fill="url(#led2)" opacity="0.9"/>
  <circle cx="185" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="215" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="245" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="275" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="305" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="335" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="365" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="395" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  <circle cx="415" cy="176" r="4" fill="#fce7f3" opacity="0.9"/>
  
  <!-- Bottom strip -->
  <rect x="190" y="210" width="220" height="12" rx="6" fill="url(#led3)" opacity="0.9"/>
  <circle cx="205" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="235" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="265" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="295" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="325" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="355" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="385" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  <circle cx="405" cy="216" r="4" fill="#ede9fe" opacity="0.9"/>
  
  <!-- Light beams -->
  <path d="M150 136 L100 80" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  <path d="M450 136 L500 80" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  <path d="M170 176 L130 120" stroke="#ec4899" stroke-width="2" opacity="0.3"/>
  <path d="M430 176 L470 120" stroke="#ec4899" stroke-width="2" opacity="0.3"/>
  <path d="M190 216 L160 160" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
  <path d="M410 216 L440 160" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
  
  <!-- Text -->
  <text x="300" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="900" fill="#ffffff" letter-spacing="2">LED LIGHTING</text>
  <text x="300" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Interior · Underglow · Headlights</text>
</svg>